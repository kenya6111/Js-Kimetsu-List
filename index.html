<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">

        <div class="d-flex justify-content-center mb-2">
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="category" id="inlineRadio1" value="全て">
                <label class="form-check-label" for="inlineRadio1">全キャラクター</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="category" id="inlineRadio2" value="鬼殺隊">
                <label class="form-check-label" for="inlineRadio2">鬼殺隊</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="category" id="inlineRadio3" value="柱">
                <label class="form-check-label" for="inlineRadio3">柱</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="category" id="inlineRadio4" value="鬼">
                <label class="form-check-label" for="inlineRadio3">鬼</label>
            </div>
        </div>
        <div  class="d-flex justify-content-center">
            <div id="loading" class="loading">ロード中...</div>
            <div id="character-list" class="row g-3 d-none"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <script src="app.js"></script>
  </body>
</html>
